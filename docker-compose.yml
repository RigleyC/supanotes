services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: supanotes-postgres
    environment:
      POSTGRES_USER: supanotes
      POSTGRES_PASSWORD: supanotes
      POSTGRES_DB: supanotes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supanotes -d supanotes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
