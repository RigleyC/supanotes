# fly.toml app configuration file generated for backend-winter-waterfall-5807 on 2026-06-13T15:32:38-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-winter-waterfall-5807'
primary_region = 'gru'

[build]
  dockerfile = 'backend/Dockerfile'
  context = 'backend/'

[env]
  AGENT_BASE_URL = 'https://integrate.api.nvidia.com/v1/chat/completions'
  AGENT_MODEL = 'minimaxai/minimax-m3'
  BRIEF_BASE_URL = 'https://api.deepseek.com/chat/completions'
  BRIEF_MODEL = 'deepseek-chat'
  EMBEDDINGS_CRON_INTERVAL = '*/30 * * * * *'
  EMBEDDINGS_MODEL = 'text-embedding-3-small'
  ENVIRONMENT = 'production'
  ORGANIZE_MODEL = 'gpt-4o-mini'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
