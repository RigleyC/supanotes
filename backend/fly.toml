# fly.toml app configuration file generated for backend-winter-waterfall-5807 on 2026-06-12T17:10:16-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-winter-waterfall-5807'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[env]
  PORT = "8080"
  ENVIRONMENT = "production"
  EMBEDDINGS_CRON_INTERVAL = "*/30 * * * * *"
  AGENT_BASE_URL = "https://api.deepseek.com/v1/chat/completions"
  AGENT_MODEL = "deepseek-v4-pro"
  BRIEF_BASE_URL = "https://api.deepseek.com/chat/completions"
  BRIEF_MODEL = "deepseek-chat"
  EMBEDDINGS_MODEL = "text-embedding-3-small"
  ORGANIZE_MODEL = "gpt-4o-mini"
