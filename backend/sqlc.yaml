version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/db/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - column: "notes.search_vector"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Text"
