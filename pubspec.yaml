name: supanotes
description: "SupaNotes — personal notes app with proactive AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Super Editor and clipboard from RigleyC's fork
  super_editor:
    git:
      url: https://github.com/RigleyC/super_editor.git
      ref: main
      path: super_editor
  super_editor_clipboard:
    git:
      url: https://github.com/RigleyC/super_editor.git
      ref: main
      path: super_editor_clipboard
  follow_the_leader: ^0.5.3

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.3.0

  # HTTP
  dio: ^5.7.0

  # Local database
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # Auth storage
  flutter_secure_storage: ^10.3.1

  # Connectivity
  connectivity_plus: ^7.1.1

  # Fonts
  google_fonts: ^8.1.0

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.13
  drift_dev: ^2.21.2

# Force the git-forked super_editor to satisfy super_editor_clipboard's
# transitive dependency on the hosted package. This is the standard pattern
# when consuming a monorepo fork.
dependency_overrides:
  super_editor:
    git:
      url: https://github.com/RigleyC/super_editor.git
      ref: main
      path: super_editor

flutter:
  uses-material-design: true
