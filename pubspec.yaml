name: supanotes
description: "SupaNotes — personal notes app with proactive AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fractional_indexing_dart: ^1.0.7

  # Firebase
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  # Super Editor and clipboard.
  super_editor:
    git:
      url: https://github.com/Flutter-Bounty-Hunters/super_editor.git
      ref: main
      path: super_editor
  super_editor_clipboard:
    git:
      url: https://github.com/Flutter-Bounty-Hunters/super_editor.git
      ref: main
      path: super_editor_clipboard
  follow_the_leader: ^0.5.3

  # State management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.3.0

  # HTTP
  dio: ^5.7.0

  # Local database
  drift: ^2.21.0
  sqlite3: ^3.0.0
  path: ^1.9.0
  path_provider: ^2.1.5

  # Auth storage
  flutter_secure_storage: ^10.3.1

  # Connectivity
  connectivity_plus: ^7.1.1

  # Fonts
  google_fonts: ^8.1.0

  # Local storage
  shared_preferences: ^2.2.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  timeago: ^3.7.0
  mime: ^2.0.0

  # Markdown parsing
  markdown: ^7.3.1

  # Yjs collaborative editing
  yjs_dart: ^1.1.15
  web_socket_channel: ^3.0.0

  # UI
  cue: ^0.1.0
  adaptive_platform_ui: ^0.1.107
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.17
  flutter_gen_ai_chat_ui: ^2.14.0
  flutter_streaming_text_markdown: ^1.9.0
  url_launcher: ^6.3.0
  file_picker: ^8.0.0
  flutter_markdown_plus: ^1.0.7
  super_clipboard: ^0.9.1

  # Motion
  motor: ^1.1.0

  # Shapes
  material_shapes:
    git:
      url: https://github.com/kamranbekirovyz/bunpod.git
      ref: main
      path: packages/material_shapes

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.21.2

  # Mocking
  mocktail: ^1.0.4
  postgres: ^3.5.12
  crdt_lf: ^3.2.1

# Force the git-sourced super_editor to satisfy super_editor_clipboard's
# transitive dependency on the hosted package. This is the standard pattern
# when consuming a monorepo fork.
dependency_overrides:
  super_editor:
    git:
      url: https://github.com/Flutter-Bounty-Hunters/super_editor.git
      ref: main
      path: super_editor
  super_keyboard:
    git:
      url: https://github.com/Flutter-Bounty-Hunters/super_editor.git
      ref: main
      path: super_keyboard
  super_text_layout:
    git:
      url: https://github.com/Flutter-Bounty-Hunters/super_editor.git
      ref: main
      path: super_text_layout
  super_editor_clipboard:
    git:
      url: https://github.com/Flutter-Bounty-Hunters/super_editor.git
      ref: main
      path: super_editor_clipboard
  yjs_dart:
    path: packages/yjs_dart

  device_info_plus: ^12.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/brand/
    - assets/icons/
    - assets/dividers/
